<!DOCTYPE html>
<html>
<head>
<style>
p {
    color: black;
}

.biru {
    background-color: lightblue;
}

.hijau {
    background-color: lightgreen;
}

.kuning {
    background-color: yellow;
}

#judul {
    font-size: 30px;
}
</style>
</head>
<body>

<h1 id="judul">Praktikum Selector CSS</h1>

<p class="biru">Paragraf dengan latar belakang biru.</p>
<p class="hijau">Paragraf dengan latar belakang hijau.</p>
<p class="kuning">Paragraf dengan latar belakang kuning.</p>

</body>
</html>
