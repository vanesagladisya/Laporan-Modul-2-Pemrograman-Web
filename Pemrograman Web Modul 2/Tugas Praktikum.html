<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praktikum CSS</title>

<style>
/* Mengatur semua elemen */
* {
    box-sizing: border-box;
}

/* Tampilan halaman */
body {
    background-color: #add8e6;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
}

/* Judul */
h1 {
    color: white;
    font-size: 40px;
    margin-bottom: 20px;
}

/* Paragraf */
p {
    background-color: #d3d3d3;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 800px;
    margin: 0 auto 30px auto;
}

/* Container Grid */
.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 800px;
    margin: auto;
}

/* Box */
.box1,
.box2,
.box3 {
    border: 2px solid black;
    padding: 10px;
    height: 150px;
    border-radius: 15px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Warna Box */
.box1 {
    background-color: #ff9999;
}

.box2 {
    background-color: #99ff99;
}

.box3 {
    background-color: #9999ff;
}

/* Responsive Tablet */
@media screen and (max-width: 768px) {
    .container {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Responsive Smartphone */
@media screen and (max-width: 480px) {

    .container {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 28px;
    }

    .box1,
    .box2,
    .box3 {
        height: 120px;
    }

    p {
        padding: 10px;
    }
}
</style>
</head>

<body>

<h1>Praktikum CSS</h1>

<p>
    Halaman ini dibuat untuk memenuhi tugas praktikum CSS yang mencakup penggunaan warna, font, box model, CSS Grid, dan Responsive Design menggunakan Media Query.
</p>

<div class="container">
    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
    <div class="box3">Box 3</div>
</div>

</body>
</html>
